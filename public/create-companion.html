<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Creează companion AI</title>
  <link rel="stylesheet" href="/style.css"/>
  <script src="/i18n.js" defer></script>
  <script src="/companions.js"></script>
  <style>
    .wrap{max-width:900px;margin:0 auto;padding:18px}
    .panel{border:1px solid var(--line);border-radius:24px;padding:20px;background:rgba(255,255,255,.04)}
    .field{margin:12px 0}.field label{display:block;margin-bottom:8px;color:var(--muted);font-size:13px}
    input,textarea,select{width:100%;border:1px solid var(--line);background:#0d0d14;color:var(--ink);border-radius:14px;padding:12px;font:inherit}
    textarea{min-height:100px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  </style>
</head>
<body class="home-page">
  <main class="wrap">
    <nav class="topbar">
      <a class="brand" href="/" data-no-translate><div class="brand-mark">AI</div><div><strong>The Future</strong><span>Constructor companion</span></div></a>
      <div class="nav-actions"><a class="ghost-btn" href="/discover.html">Descoperă</a></div>
    </nav>
    <section class="panel" style="margin-top:16px">
      <h1 id="pageTitle">Creează companion AI</h1>
      <p id="pageHelper" class="muted">Creează doar personaje fictive adulte. Nu folosi persoane reale, minori sau identități fără consimțământ.</p>
      <div class="field"><label>Nume companion</label><input id="name" placeholder="Raven Lux"></div>
      <div class="field"><label>Bio scurt</label><input id="bio" placeholder="Companion AI fictiv cu atmosferă elegantă și misterioasă."></div>
      <div class="field"><label>Vibe / stil</label><input id="vibe" placeholder="dark luxury • cinematic • intense"></div>
      <div class="field"><label>Trăsături de personalitate, separate prin virgulă</label><input id="personality" placeholder="calmă, misterioasă, protectivă"></div>
      <div class="field"><label>Taguri, separate prin virgulă</label><input id="tags" placeholder="luxury, cinematic, romance"></div>
      <div class="field"><label>Stil prompt pentru imagine/video</label><textarea id="promptStyle" placeholder="elegant cinematic portrait, dark luxury lighting, realistic atmosphere"></textarea></div>
      <div class="field"><label>Temă vizuală</label><select id="theme"><option value="ava-theme">Dark luxury</option><option value="mira-theme">Soft romance</option><option value="kira-theme">Cyberpunk</option><option value="luna-theme">Goth romance</option><option value="dante-theme">Masculine luxury</option><option value="noah-theme">Elegant premium</option></select></div>
      <div class="actions"><button id="saveBtn" class="main-btn" type="button">Salvează companion</button><a id="viewBtn" class="ghost-btn" href="/discover.html">Vezi companionul</a></div>
    </section>
  </main>
<script>
function parseCommaList(value){ return String(value||"").split(",").map(s=>s.trim()).filter(Boolean); }
function getQueryEditSlug(){
  try{
    const params = new URLSearchParams(window.location.search || "");
    return (params.get("edit") || "").trim();
  }catch(e){
    return "";
  }
}
function findCustomCompanionBySlug(slug){
  if(!slug) return null;
  const list = TFP_COMPANIONS.getCustomCompanions();
  return list.find(function(item){ return item && item.slug === slug; }) || null;
}
function fillFormFromCompanion(item){
  if(!item) return;
  document.getElementById("name").value = item.name || "";
  document.getElementById("bio").value = item.bio || "";
  document.getElementById("vibe").value = item.vibe || "";
  document.getElementById("personality").value = Array.isArray(item.personality) ? item.personality.join(", ") : "";
  document.getElementById("tags").value = Array.isArray(item.tags) ? item.tags.join(", ") : "";
  document.getElementById("promptStyle").value = item.promptStyle || "";
  document.getElementById("theme").value = item.theme || "ava-theme";
}
function makeCompanionFromForm(editingCompanion){
  const name = document.getElementById("name").value.trim();
  if(!name){ alert("Completează numele companionului."); return null; }
  const base = TFP_COMPANIONS.createCompanionFromData({
    slug: editingCompanion ? editingCompanion.slug : TFP_COMPANIONS.slugifyName(name),
    name,
    bio: document.getElementById("bio").value.trim(),
    vibe: document.getElementById("vibe").value.trim(),
    personality: parseCommaList(document.getElementById("personality").value),
    tags: parseCommaList(document.getElementById("tags").value),
    promptStyle: document.getElementById("promptStyle").value.trim(),
    theme: document.getElementById("theme").value,
    kicker: "COMPANION CUSTOM",
    experience: "Chat + image + video",
    lore: document.getElementById("bio").value.trim(),
    mood: document.getElementById("vibe").value.trim()
  });

  if(editingCompanion){
    return {
      ...editingCompanion,
      slug: editingCompanion.slug,
      createdAt: editingCompanion.createdAt,
      updatedAt: new Date().toISOString(),
      name: base.name,
      bio: base.bio,
      vibe: base.vibe,
      personality: base.personality,
      tags: base.tags,
      promptStyle: base.promptStyle,
      theme: base.theme,
      lore: base.lore,
      mood: base.mood
    };
  }

  return {
    ...base,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
}

const editSlug = getQueryEditSlug();
const editingCompanion = findCustomCompanionBySlug(editSlug);
const isEditMode = Boolean(editingCompanion);

if(isEditMode){
  document.getElementById("pageTitle").textContent = "Editează companion AI";
  document.getElementById("pageHelper").textContent = "Editează companionul tău local. Modificările sunt salvate în browser și păstrează același slug.";
  document.getElementById("saveBtn").textContent = "Salvează modificările";
  fillFormFromCompanion(editingCompanion);
}

document.getElementById("saveBtn").addEventListener("click", function(){
  const item = makeCompanionFromForm(editingCompanion);
  if(!item) return;
  const list = TFP_COMPANIONS.getCustomCompanions();

  if(isEditMode){
    const index = list.findIndex(function(entry){ return entry && entry.slug === editingCompanion.slug; });
    if(index === -1){
      alert("Companionul nu mai există local. Reîncarcă pagina.");
      return;
    }
    list[index] = item;
  }else{
    list.unshift(item);
  }

  TFP_COMPANIONS.saveCustomCompanions(list);
  document.getElementById("viewBtn").href = "/profile.html?slug=" + encodeURIComponent(item.slug);
  document.getElementById("viewBtn").textContent = "Deschide companionul";
  alert(isEditMode ? "Modificări salvate local." : "Companion salvat local.");
});
</script>
</body>
</html>
