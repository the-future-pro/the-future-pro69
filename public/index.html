  <!-- SCRIPT -->
  <script>

    const switcher = document.getElementById("langSwitcher");

    if (switcher && Array.isArray(window.LANG_OPTIONS)) {

      switcher.innerHTML = window.LANG_OPTIONS
        .map(([code, label]) => {
          return `<option value="${code}">${label}</option>`;
        })
        .join("");

      switcher.value =
        localStorage.getItem("site_lang") || "ro";

      switcher.addEventListener("change", (e) => {
        setLang(e.target.value);
      });

    }

    applyTranslations();

  </script>
