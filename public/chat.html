<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Chat — The Future PRO</title>

  <link rel="stylesheet" href="/style.css" />
  <script src="/i18n.js" defer></script>
  <script src="/wallet.js" defer></script>

  <style>
    .chat-shell{max-width:980px;margin:0 auto;padding:18px}
    .chat-app{min-height:88vh;border:1px solid var(--line);border-radius:30px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));box-shadow:0 30px 90px rgba(0,0,0,.55)}
    .chat-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.28);backdrop-filter:blur(16px)}
    .companion{display:flex;align-items:center;gap:12px}
    .avatar{width:54px;height:54px;border-radius:18px;overflow:hidden;flex-shrink:0;box-shadow:0 0 35px rgba(255,46,136,.22)}
    .ai-face{width:100%;height:100%;position:relative;overflow:hidden;background:#111}
    .ai-face:before{content:"";position:absolute;width:38%;height:44%;left:31%;top:16%;border-radius:48%;background:rgba(255,255,255,.78);filter:blur(8px);opacity:.38}
    .ai-face:after{content:"";position:absolute;left:18%;right:18%;bottom:0;height:48%;border-radius:48% 48% 0 0;background:rgba(255,255,255,.18);filter:blur(10px)}
    .ava-face{background:radial-gradient(circle at 50% 26%,rgba(255,220,235,.60),transparent 18%),radial-gradient(circle at 50% 42%,rgba(255,46,136,.36),transparent 32%),linear-gradient(135deg,#1d081e,#050509)}
    .mira-face{background:radial-gradient(circle at 50% 26%,rgba(255,235,210,.60),transparent 18%),radial-gradient(circle at 52% 44%,rgba(255,176,90,.34),transparent 34%),linear-gradient(135deg,#25130c,#050509)}
    .kira-face{background:radial-gradient(circle at 50% 26%,rgba(210,250,255,.58),transparent 18%),radial-gradient(circle at 50% 44%,rgba(0,230,255,.34),transparent 34%),linear-gradient(135deg,#031b25,#050509)}
    .luna-face{background:radial-gradient(circle at 50% 26%,rgba(235,220,255,.58),transparent 18%),radial-gradient(circle at 50% 44%,rgba(130,70,255,.34),transparent 34%),linear-gradient(135deg,#15051f,#050509)}
    .dante-face{background:radial-gradient(circle at 50% 26%,rgba(255,220,200,.54),transparent 18%),radial-gradient(circle at 50% 44%,rgba(190,35,35,.30),transparent 34%),linear-gradient(135deg,#210506,#050509)}
    .noah-face{background:radial-gradient(circle at 50% 26%,rgba(220,235,255,.54),transparent 18%),radial-gradient(circle at 50% 44%,rgba(80,120,255,.28),transparent 34%),linear-gradient(135deg,#071027,#050509)}

    .companion strong{display:block;font-size:18px}
    .companion span{display:block;color:var(--muted);font-size:13px}
    .status-dot{display:inline-block;width:8px;height:8px;background:#34d399;border-radius:999px;margin-right:6px;box-shadow:0 0 14px #34d399}

    .chat-log{height:58vh;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:radial-gradient(500px 260px at 10% 20%,rgba(155,92,255,.12),transparent),radial-gradient(500px 260px at 90% 40%,rgba(255,46,136,.1),transparent)}
    .bubble{max-width:78%;padding:13px 15px;border-radius:20px;line-height:1.45;border:1px solid var(--line);word-break:break-word}
    .bubble.you{align-self:flex-end;background:linear-gradient(135deg,var(--red),var(--pink));color:white;border-color:transparent;border-bottom-right-radius:6px}
    .bubble.ai{align-self:flex-start;background:rgba(255,255,255,.07);border-bottom-left-radius:6px}
    .bubble small{display:block;color:rgba(255,255,255,.7);margin-bottom:5px}
    .bubble-media{margin-top:8px;border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(0,0,0,.25)}

    .composer{padding:16px;border-top:1px solid var(--line);background:rgba(0,0,0,.28)}
    .composer-row{display:flex;gap:10px}
    .composer-row input{flex:1}
    .tools{margin-top:12px;display:grid;grid-template-columns:120px 150px 1fr 150px;gap:10px}
    .typing{color:var(--muted);font-size:13px;padding:0 18px 12px;display:none}
    .empty{text-align:center;color:var(--muted);padding:60px 20px;line-height:1.6}
    .profile-chip{display:inline-flex;align-items:center;gap:6px;margin-top:4px;color:var(--muted);font-size:12px;text-decoration:none}
    .profile-chip:hover{color:#ff5fb0}
    .mini-hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.45}

    @media(max-width:760px){
      .chat-shell{padding:8px}
      .chat-app{border-radius:22px}
      .chat-log{height:56vh}
      .tools{grid-template-columns:1fr}
      .bubble{max-width:92%}
      .chat-head{align-items:flex-start;flex-wrap:wrap}
      .composer-row{display:grid;grid-template-columns:1fr}
    }
  </style>
</head>

<body class="home-page">
<main class="chat-shell">
  <div class="chat-app">

    <div class="chat-head">
      <div class="companion">
        <div class="avatar">
          <div id="avatarArt" class="ai-face ava-face"></div>
        </div>

        <div>
          <strong id="title" data-no-translate>Ava Noir</strong>
          <span>
            <i class="status-dot"></i>
            online • <span id="vibeText">Dark luxury companion</span>
          </span>
          <a id="profileLink" class="profile-chip" href="/profile.html?slug=ava-noir">
            Vezi profilul companionului
          </a>
        </div>
      </div>

      <select id="langSwitcher" class="lang-switcher" aria-label="Language"></select>

      <div class="nav-actions">
        <a class="ghost-btn" href="/feed.html">Feed</a>
        <a class="ghost-btn" href="/credits.html" data-wallet-balance-link>Credits: 0 CR</a>
        <a class="ghost-btn" id="backProfile" href="/profile.html?slug=ava-noir">Profil</a>
        <a class="main-btn" href="/gen-image.html">Creează</a>
      </div>
    </div>

    <div id="log" class="chat-log">
      <div class="empty" id="empty">Se încarcă conversația...</div>
    </div>

    <div id="typing" class="typing">AI scrie...</div>

    <div class="composer">
      <div class="composer-row">
        <input
          id="text"
          placeholder="Scrie un mesaj..."
          onkeydown="if(event.key==='Enter')send()"
        >

        <button
          id="sendBtn"
          class="main-btn"
          onclick="send()"
          style="border:0"
        >
          Trimite
        </button>
      </div>

      <div class="tools">
        <select id="kind">
          <option value="image">Image teaser</option>
          <option value="video">Video teaser</option>
        </select>

        <select id="quality_img">
          <option value="1024">1024</option>
          <option value="2048">2048</option>
          <option value="8k">8K</option>
        </select>

        <input id="neg" placeholder="Extra style / negative prompt">

        <button
          class="ghost-btn"
          onclick="offer()"
          style="border:1px solid var(--line)"
        >
          Generează teaser
        </button>
      </div>

      <div
        id="videoOpts"
        class="tools"
        style="display:none;grid-template-columns:1fr 1fr;margin-top:10px"
      >
        <select id="v_sec">
          <option value="10">10s</option>
          <option value="20">20s</option>
        </select>

        <select id="v_q">
          <option>1080p</option>
          <option>4k</option>
        </select>
      </div>

      <div class="mini-hint">
        Chatul este conectat la backend persistent mock. Mesajele trebuie să rămână după refresh.
      </div>
    </div>

  </div>
</main>

<script>
const profiles = {
  "ava-noir": {
    name:"Ava Noir",
    face:"ava-face",
    vibe:"Dark luxury companion"
  },
  "mira-vale": {
    name:"Mira Vale",
    face:"mira-face",
    vibe:"Soft romance companion"
  },
  "kira-voss": {
    name:"Kira Voss",
    face:"kira-face",
    vibe:"Cyberpunk muse"
  },
  "luna-sable": {
    name:"Luna Sable",
    face:"luna-face",
    vibe:"Goth romantic companion"
  },
  "dante-vale": {
    name:"Dante Vale",
    face:"dante-face",
    vibe:"Masculine luxury companion"
  },
  "noah-sterling": {
    name:"Noah Sterling",
    face:"noah-face",
    vibe:"Elegant CEO companion"
  }
};

const qs = new URLSearchParams(location.search);
const slug = qs.get("slug") || "ava-noir";
const profile = profiles[slug] || profiles["ava-noir"];

document.title = profile.name + " Chat — The Future PRO";
document.getElementById("title").textContent = profile.name;
document.getElementById("vibeText").textContent = profile.vibe;
document.getElementById("avatarArt").className = "ai-face " + profile.face;
document.getElementById("profileLink").href = "/profile.html?slug=" + encodeURIComponent(slug);
document.getElementById("backProfile").href = "/profile.html?slug=" + encodeURIComponent(slug);

const j = (u,o)=>fetch(u,{
  method:o?.method || "GET",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:o?.body ? JSON.stringify(o.body) : undefined
}).then(async r=>{
  const data = await r.json().catch(()=>({
    ok:false,
    error:"bad_json"
  }));

  data.__status = r.status;
  return data;
});

let lastId = 0;
let renderedIds = new Set();

document.getElementById("kind").addEventListener("change", e=>{
  const v = e.target.value;

  document.getElementById("quality_img").style.display =
    v === "image" ? "block" : "none";

  document.getElementById("videoOpts").style.display =
    v === "video" ? "grid" : "none";
});

async function ensureLogin(){
  try{
    const me = await j("/api/me");

    if(me.ok && me.logged){
      return true;
    }

    const r = await j(
      "/api/mock-login?email=" + encodeURIComponent("test@future.ai")
    );

    return !!r.ok;
  }catch(e){
    return false;
  }
}

async function load(){
  let r;

  try{
    const lang = localStorage.getItem("site_lang") || "ro";

    r = await j(
      `/api/chat/${encodeURIComponent(slug)}/history?after=${lastId}&lang=${encodeURIComponent(lang)}`
    );
  }catch(e){
    r = {
      ok:false,
      items:[]
    };
  }

  if(!r.ok){
    showEmpty("Nu pot încărca istoricul chatului. Verifică deploy-ul/serverul.");
    return;
  }

  const items = r.items || [];

  if(!items.length && lastId === 0){
    showEmpty("Conversația este goală momentan.");
    return;
  }

  items.forEach(m=>render(m));
}

function showEmpty(text){
  const log = document.getElementById("log");

  if(!document.getElementById("empty")){
    log.innerHTML = `<div class="empty" id="empty"></div>`;
  }

  document.getElementById("empty").textContent = text;
}

function render(m){
  if(m.id && renderedIds.has(m.id)){
    return;
  }

  if(m.id){
    renderedIds.add(m.id);
    lastId = Math.max(lastId, Number(m.id || 0));
  }

  const empty = document.getElementById("empty");

  if(empty){
    empty.remove();
  }

  const log = document.getElementById("log");
  const d = document.createElement("div");

  const isAI =
    m.sender_type === "persona" ||
    m.sender_type === "ai";

  d.className =
    "bubble " + (isAI ? "ai" : "you");

  const msgText =
    m.translatedText ||
    m.text ||
    "";

  if(m.kind === "text" || !m.kind){
    d.innerHTML = `
      <small>${isAI ? profile.name : "Tu"}</small>
      ${escapeHtml(msgText)}
    `;
  }else{
    const media = m.media || {};

    d.innerHTML = `
      <small>${profile.name}</small>
      <div class="bubble-media">
        Teaser media privat · ${escapeHtml(media.type || "")} · ${escapeHtml(media.price_credits || 0)} cr
      </div>
    `;
  }

  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

async function send(){
  const input = document.getElementById("text");
  const btn = document.getElementById("sendBtn");
  const t = input.value.trim();

  if(!t){
    return;
  }

  btn.disabled = true;
  document.getElementById("typing").style.display = "block";

  try{
    const r = await j(
      `/api/chat/${encodeURIComponent(slug)}/send`,
      {
        method:"POST",
        body:{text:t}
      }
    );

    if(!r.ok){
      alert("Mesajul nu s-a salvat: " + (r.error || "eroare necunoscută"));
      return;
    }

    input.value = "";

    if(r.userMessage){
      render(r.userMessage);
    }

    if(r.personaMessage){
      render(r.personaMessage);
    }

    await load();
  }catch(e){
    alert("Eroare la trimitere. Verifică serverul.");
  }finally{
    document.getElementById("typing").style.display = "none";
    btn.disabled = false;
    input.focus();
  }
}

function ensurePremiumAccess(baseKey){
  const scopedKey = baseKey + ":" + slug;

  if(TFP_WALLET.isPremiumUnlocked(scopedKey)) return true;

  alert("Acest conținut este premium. Deblochează-l cu credite pentru a continua.");

  if(TFP_WALLET.getBalance() < 300){
    location.href = "/credits.html";
  }else{
    location.href = "/profile.html?slug=" + encodeURIComponent(slug);
  }

  return false;
}

async function offer(){
  if(!ensurePremiumAccess("special_story")){
    return;
  }

  const kind = document.getElementById("kind").value;

  const body = {
    kind,
    negative: document.getElementById("neg").value
  };

  if(kind === "image"){
    body.quality =
      document.getElementById("quality_img").value;
  }else{
    body.duration =
      Number(document.getElementById("v_sec").value);

    body.quality =
      document.getElementById("v_q").value;
  }

  try{
    const r = await j(
      `/api/chat/${encodeURIComponent(slug)}/offer`,
      {
        method:"POST",
        body
      }
    );

    if(!r.ok){
      alert("Teaserul nu s-a salvat: " + (r.error || "eroare necunoscută"));
      return;
    }

    if(r.item){
      render(r.item);
    }

    await load();
  }catch(e){
    alert("Eroare la generarea teaserului.");
  }
}

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

(async function boot(){
  const logged = await ensureLogin();

  if(!logged){
    showEmpty("Nu ești logat. Intră în Premium și apasă Autentificare.");
    return;
  }

  await load();
})();
</script>


<script>
function getCreditsHeaderLabel(){
  const lang = typeof window.getLangCode === "function"
    ? window.getLangCode()
    : (localStorage.getItem("site_lang") || "ro");

  const labels = { ro: "Credite", en: "Credits", ru: "Кредиты" };
  return labels[lang] || labels.ro;
}

function refreshHeaderCredits(){
  if(!window.TFP_WALLET) return;
  const text = getCreditsHeaderLabel() + ": " + TFP_WALLET.getBalance() + " CR";
  document.querySelectorAll("[data-wallet-balance-link]").forEach(function(el){
    el.textContent = text;
  });
}

window.addEventListener("DOMContentLoaded", refreshHeaderCredits);
window.addEventListener("tfp:wallet-updated", refreshHeaderCredits);
</script>

</body>
</html>
