<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />

  <title>Chat — The Future PRO</title>

  <link rel="stylesheet" href="/style.css?v=4006" />
  <script src="/i18n.js?v=4006" defer></script>

  <style>
    .chat-shell{max-width:980px;margin:0 auto;padding:18px}
    .chat-app{
      min-height:88vh;
      border:1px solid var(--line);
      border-radius:30px;
      overflow:hidden;
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
      box-shadow:0 30px 90px rgba(0,0,0,.55);
    }
    .chat-head{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      padding:18px;border-bottom:1px solid var(--line);
      background:rgba(0,0,0,.28);backdrop-filter:blur(16px);
    }
    .companion{display:flex;align-items:center;gap:12px}
    .avatar{
      width:52px;height:52px;border-radius:18px;
      background:linear-gradient(135deg,var(--purple),var(--pink));
      display:grid;place-items:center;font-weight:900;
      box-shadow:0 0 35px rgba(255,46,136,.35);
    }
    .companion strong{display:block;font-size:18px}
    .companion span{display:block;color:var(--muted);font-size:13px}
    .status-dot{display:inline-block;width:8px;height:8px;background:#34d399;border-radius:999px;margin-right:6px}
    .chat-log{
      height:58vh;
      overflow:auto;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      background:
        radial-gradient(500px 260px at 10% 20%,rgba(155,92,255,.12),transparent),
        radial-gradient(500px 260px at 90% 40%,rgba(255,46,136,.1),transparent);
    }
    .bubble{
      max-width:78%;
      padding:13px 15px;
      border-radius:20px;
      line-height:1.45;
      border:1px solid var(--line);
      animation:pop .18s ease;
    }
    @keyframes pop{from{transform:translateY(4px);opacity:.3}to{transform:none;opacity:1}}
    .bubble.you{
      align-self:flex-end;
      background:linear-gradient(135deg,var(--red),var(--pink));
      color:white;
      border-color:transparent;
      border-bottom-right-radius:6px;
    }
    .bubble.ai{
      align-self:flex-start;
      background:rgba(255,255,255,.07);
      border-bottom-left-radius:6px;
    }
    .bubble small{display:block;color:rgba(255,255,255,.7);margin-bottom:5px}
    .media-box{
      margin-top:8px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#07070a;
    }
    .media{
      display:block;width:100%;max-height:360px;object-fit:cover;
    }
    .blurred{filter:blur(16px)}
    .unlock-row{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      padding:12px;background:rgba(0,0,0,.42);
    }
    .composer{
      padding:16px;
      border-top:1px solid var(--line);
      background:rgba(0,0,0,.28);
    }
    .composer-row{display:flex;gap:10px}
    .composer-row input{flex:1}
    .tools{
      margin-top:12px;
      display:grid;
      grid-template-columns:120px 150px 1fr 150px;
      gap:10px;
    }
    .typing{
      color:var(--muted);
      font-size:13px;
      padding:0 18px 12px;
      display:none;
    }
    .empty{
      text-align:center;
      color:var(--muted);
      padding:60px 20px;
    }
    @media(max-width:760px){
      .chat-shell{padding:8px}
      .chat-app{border-radius:22px}
      .chat-log{height:56vh}
      .tools{grid-template-columns:1fr}
      .bubble{max-width:92%}
      .chat-head{align-items:flex-start}
    }
  </style>
</head>

<body class="home-page">
  <main class="chat-shell">
    <div class="chat-app">

      <div class="chat-head">
        <div class="companion">
          <div class="avatar" id="avatar">AI</div>

          <div>
            <strong id="title">Companion</strong>

            <span>
              <i class="status-dot"></i>
              <span data-i18n="online">online</span>
              •
              <span data-i18n="chat_title">Chat privat</span>
            </span>
          </div>
        </div>

        <select
          id="langSwitcher"
          class="lang-switcher"
          aria-label="Language"
        ></select>

        <div class="nav-actions">
          <a
            class="ghost-btn"
            href="/premium"
            data-i18n="member_area"
          >
            Zona de membri
          </a>

          <a
            class="main-btn"
            href="/gen-image.html"
            data-i18n="create"
          >
            Creează
          </a>
        </div>
      </div>

      <div id="log" class="chat-log">
        <div
          class="empty"
          id="empty"
          data-i18n="chat_empty"
        >
          Alege un companion din Premium sau începe conversația.
        </div>
      </div>

      <div
        id="typing"
        class="typing"
        data-i18n="typing"
      >
        AI scrie...
      </div>

      <div class="composer">
        <div class="composer-row">
          <input
            id="text"
            data-i18n-placeholder="chat_placeholder"
            placeholder="Scrie un mesaj..."
            onkeydown="if(event.key==='Enter')send()"
          >

          <button
            class="main-btn"
            onclick="send()"
            style="border:0"
            data-i18n="send"
          >
            Trimite
          </button>
        </div>

        <div class="tools">
          <select id="kind">
            <option value="image">Image teaser</option>
            <option value="video">Video teaser</option>
          </select>

          <select id="quality_img">
            <option value="1024">1024</option>
            <option value="2048">2048</option>
            <option value="8k">8K</option>
          </select>

          <input
            id="neg"
            data-i18n-placeholder="negative_prompt"
            placeholder="Extra style / negative prompt"
          >

          <button
            class="ghost-btn"
            onclick="offer()"
            style="border:1px solid var(--line)"
            data-i18n="generate_teaser"
          >
            Generează teaser
          </button>
        </div>

        <div
          id="videoOpts"
          class="tools"
          style="display:none;grid-template-columns:1fr 1fr;margin-top:10px"
        >
          <select id="v_sec">
            <option value="10">10s</option>
            <option value="20">20s</option>
          </select>

          <select id="v_q">
            <option>1080p</option>
            <option>4k</option>
          </select>
        </div>
      </div>

    </div>
  </main>

<script>
const qs = new URLSearchParams(location.search);
const slug = qs.get('slug') || '';
const readableName = slug
  ? slug.replaceAll('-', ' ').replace(/\b\w/g, c => c.toUpperCase())
  : 'Choose Companion';

document.getElementById('title').textContent = readableName;
document.getElementById('avatar').textContent =
  readableName.split(' ').map(x=>x[0]).join('').slice(0,2) || 'AI';

const j=(u,o)=>fetch(u,{
  method:o?.method||'GET',
  headers:{'Content-Type':'application/json'},
  credentials:'include',
  body:o?.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());

let lastId=0;

document.getElementById('kind').addEventListener('change', e=>{
  const v = e.target.value;
  document.getElementById('quality_img').style.display = v==='image'?'block':'none';
  document.getElementById('videoOpts').style.display  = v==='video'?'grid':'none';
});

async function load(){
  if(!slug) return;

  let r;
  try{
    const lang = localStorage.getItem('site_lang') || 'ro';
    r = await j(`/api/chat/${encodeURIComponent(slug)}/history?after=${lastId}&lang=${encodeURIComponent(lang)}`);
  }catch(e){
    r = {items:[]};
  }

  (r.items||[]).forEach(m=>{
    lastId = Math.max(lastId, m.id || 0);
    render(m);
  });
}

function render(m){
  const empty = document.getElementById('empty');
  if(empty) empty.remove();

  const log = document.getElementById('log');
  const d = document.createElement('div');

  const isAI = m.sender_type === 'persona' || m.sender_type === 'ai';
  d.className = 'bubble ' + (isAI ? 'ai' : 'you');

  const msgText = m.translatedText || m.text || '';

  if(m.kind === 'text' || !m.kind){
    d.innerHTML = `<small>${isAI ? readableName : 'Tu'}</small>${escapeHtml(msgText)}`;
  } else {
    const med = m.media || {};
    const isLocked = m.kind === 'media_locked';
    const url = isLocked ? med.preview_url : med.full_url;

    d.innerHTML = `
      <small>${isAI ? readableName : 'Media'}</small>
      <div>${isLocked ? 'Private teaser locked' : 'Unlocked media'} · ${med.type || ''} · ${med.price_credits || 0} credits</div>
      <div class="media-box">
        ${med.type === 'video'
          ? `<video controls class="media ${isLocked?'blurred':''}" src="${url || ''}"></video>`
          : `<img class="media ${isLocked?'blurred':''}" src="${url || ''}" alt="media">`
        }
        ${isLocked ? `
          <div class="unlock-row">
            <span>Unlock full media</span>
            <button class="main-btn" data-id="${med.id}" style="border:0">${med.price_credits || 0} cr</button>
          </div>` : ''}
      </div>
    `;

    const btn = d.querySelector('button[data-id]');
    if(btn){
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-id');
        const r = await j('/api/media/'+id+'/unlock',{method:'POST'});
        if(r.ok) location.reload(); else alert(r.error || 'Eroare la unlock');
      };
    }
  }

  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

async function send(){
  if(!slug) return alert('Alege un companion din pagina Premium.');

  const input = document.getElementById('text');
  const t = input.value.trim();

  if(!t) return;

  render({
    sender_type:'user',
    kind:'text',
    text:t
  });

  input.value='';

  document.getElementById('typing').style.display='block';

  try{
    await j(`/api/chat/${encodeURIComponent(slug)}/send`,{
      method:'POST',
      body:{text:t}
    });
  }catch(e){
    setTimeout(()=>{
      render({
        sender_type:'persona',
        kind:'text',
        text:'I am here. Tell me what kind of experience you want to create tonight.'
      });
    },500);
  }

  setTimeout(()=>{
    document.getElementById('typing').style.display='none';
    load();
  },600);
}

async function offer(){
  if(!slug) return alert('Alege un companion din pagina Premium.');

  const kind = document.getElementById('kind').value;

  let body = {
    kind,
    negative: document.getElementById('neg').value
  };

  if(kind === 'image'){
    body.quality = document.getElementById('quality_img').value;
  } else {
    body.duration = Number(document.getElementById('v_sec').value);
    body.quality  = document.getElementById('v_q').value;
  }

  try{
    const r = await j(`/api/chat/${encodeURIComponent(slug)}/offer`,{
      method:'POST',
      body
    });

    if(!r.ok) alert(r.error || 'Eroare');
  }catch(e){
    render({
      sender_type:'persona',
      kind:'text',
      text:'Media teaser generation will be available after the backend route is connected.'
    });
  }

  setTimeout(load,300);
}

function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

load();
setInterval(load,3000);
</script>

</body>
</html>
